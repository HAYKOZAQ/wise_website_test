# Render Blueprint — https://render.com
# 1) New → Blueprint → connect this repo
# 2) Set GEMINI_API_KEY in the dashboard (Environment)
services:
  - type: web
    name: wisef-rag-api
    runtime: docker
    dockerfilePath: Dockerfile.slim
    plan: free
    healthCheckPath: /api/status
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: HOST
        value: 0.0.0.0
      # Do not block boot on scrape — corpus is in the image
      - key: FORCE_SCRAPE_ON_BOOT
        value: "0"
      - key: REINGEST_INTERVAL_HOURS
        value: "0"
      - key: REINGEST_MODE
        value: "off"
      - key: ADMIN_TOKEN
        sync: false
